<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--font-body);background:var(--color-bg);padding:20px 24px;box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { ProductCard, CategoryCard, StarRating, PriceBlock } = window.SwadyumDesignSystem_f6d83b;
function Demo(){
  const product = { name: 'Aam Ka Achar', image: '../../assets/imagery/prod-mango.webp', price: 299, oldPrice: 399, rating: 4.8, reviewsCount: 132, tagline: 'Sun-cured raw mango pickle', badge: 'bestseller' };
  const category = { title: 'Mango Pickle', subtitle: 'The timeless favorite', image: '../../assets/imagery/cat-mango.webp' };
  return (
    <div style={{display:'flex', gap:20, flexWrap:'wrap', alignItems:'flex-start'}}>
      <div style={{width:220}}><ProductCard product={product} /></div>
      <div style={{width:220}}><CategoryCard category={category} /></div>
      <div style={{display:'flex', flexDirection:'column', gap:12, paddingTop:8}}>
        <StarRating rating={4.8} count={132} />
        <StarRating rating={4.9} size={20} />
        <PriceBlock price={299} oldPrice={399} />
        <PriceBlock price={299} unit="250g" />
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

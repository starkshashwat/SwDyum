<html>
<head>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>body{margin:0;font-family:var(--font-body);background:var(--color-bg);padding:20px 24px;box-sizing:border-box;}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Input, Select, QuantitySelector, OtpInput, Checkbox } = window.SwadyumDesignSystem_f6d83b;
function Demo(){
  const [email, setEmail] = React.useState('');
  const [sort, setSort] = React.useState('default');
  const [qty, setQty] = React.useState(2);
  const [otp, setOtp] = React.useState('4');
  const [checked, setChecked] = React.useState(true);
  return (
    <div style={{display:'flex', flexDirection:'column', gap:18}}>
      <Input placeholder="Your email address" value={email} onChange={e=>setEmail(e.target.value)} />
      <div style={{display:'flex', gap:16, alignItems:'center'}}>
        <Select value={sort} onChange={e=>setSort(e.target.value)} options={[{key:'default',label:'Recommended'},{key:'price-low',label:'Price: Low → High'}]} />
        <QuantitySelector value={qty} onChange={setQty} />
      </div>
      <OtpInput value={otp} onChange={setOtp} />
      <Checkbox checked={checked} onChange={e=>setChecked(e.target.checked)} label="Get delivery updates & exclusive offers on WhatsApp" />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>

<!-- @dsCard group="Colors" viewport="700x160" name="Primary Greens" subtitle="Brand primary — from the logo" -->
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background:#fff; }
  .row { display:flex; height:160px; }
  .sw { flex:1; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; padding:14px; box-sizing:border-box; color:#fff; }
  .sw span { font-size:12px; font-weight:700; }
  .sw small { font-size:11px; opacity:0.85; display:block; }
  .light span, .light small { color: var(--color-ink); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--green-900)"><span>--green-900</span><small>#064022</small></div>
    <div class="sw" style="background:var(--green-800)"><span>--color-primary</span><small>#0a5a32</small></div>
    <div class="sw" style="background:var(--green-700)"><span>--color-primary-light</span><small>#15834b</small></div>
    <div class="sw light" style="background:var(--lime-300)"><span>--color-secondary</span><small>#c8dca0</small></div>
    <div class="sw light" style="background:var(--lime-200)"><span>--color-secondary-light</span><small>#dcedbe</small></div>
  </div>
</body>
</html>

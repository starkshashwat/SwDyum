<!-- @dsCard group="Colors" viewport="700x160" name="Accent & Semantic" subtitle="Amber accent, success, destructive" -->
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background:#fff; }
  .row { display:flex; height:160px; }
  .sw { flex:1; display:flex; flex-direction:column; align-items:flex-start; justify-content:flex-end; padding:14px; box-sizing:border-box; color:#fff; }
  .sw span { font-size:12px; font-weight:700; }
  .sw small { font-size:11px; opacity:0.9; display:block; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--color-accent)"><span>--color-accent</span><small>#e8a83a — "Spicy" badge</small></div>
    <div class="sw" style="background:var(--color-success)"><span>--color-success</span><small>#0a5a32</small></div>
    <div class="sw" style="background:var(--color-destructive)"><span>--color-destructive</span><small>#c0392b — not in source, errors only</small></div>
  </div>
</body>
</html>

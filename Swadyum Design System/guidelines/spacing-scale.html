<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing Scale" subtitle="4px base — space-1 through space-24" -->
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--color-surface); }
  .wrap { padding: 24px 32px; display:flex; flex-direction:column; gap:8px; }
  .row { display:flex; align-items:center; gap:12px; }
  .bar { height:14px; background: var(--color-primary); border-radius:3px; }
  .row span { font-size:11px; font-family:monospace; color: var(--color-muted); width:130px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span>--space-2 (8px)</span><div class="bar" style="width:var(--space-2)"></div></div>
    <div class="row"><span>--space-4 (16px)</span><div class="bar" style="width:var(--space-4)"></div></div>
    <div class="row"><span>--space-6 (24px)</span><div class="bar" style="width:var(--space-6)"></div></div>
    <div class="row"><span>--space-10 (40px)</span><div class="bar" style="width:var(--space-10)"></div></div>
    <div class="row"><span>--space-16 (64px)</span><div class="bar" style="width:var(--space-16)"></div></div>
    <div class="row"><span>--space-24 (96px)</span><div class="bar" style="width:var(--space-24)"></div></div>
  </div>
</body>
</html>

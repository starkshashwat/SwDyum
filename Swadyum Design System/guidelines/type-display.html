<!-- @dsCard group="Type" viewport="700x220" name="Display / Heading" subtitle="Poppins 700/800 + signature italic emphasis" -->
<html>
<head>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; font-family: var(--font-body); background: var(--color-bg); }
  .wrap { padding: 28px 32px; }
  h1 { font-family: var(--font-heading); font-weight: 800; font-size: 40px; line-height: 1.15; color: var(--color-ink); margin:0 0 8px; }
  h1 em { font-style: italic; font-weight: 400; color: var(--color-primary); }
  h2 { font-family: var(--font-heading); font-weight: 700; font-size: 26px; color: var(--color-ink); margin:0; }
  h2 em { font-style: italic; font-weight: 400; color: var(--color-primary); }
</style>
</head>
<body>
  <div class="wrap">
    <h1>Taste the <em>Heritage.</em> Feel the <em>Tradition.</em></h1>
    <h2>Meet the <em>4 Flavours</em></h2>
  </div>
</body>
</html>

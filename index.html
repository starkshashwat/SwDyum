    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Swadyum — Authentic Bihari pickles, handcrafted in traditional clay pots, sun-cured for 21 days with cold-pressed mustard oil. Small-batch heritage pickles delivered across India." />
    <meta name="theme-color" content="#C1402B" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800;1,9..144,400;1,9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- GoKwik KwikPass Integration -->
    <script id="kwikpass-init">  
      window.merchantInfo = {
        ...window.merchantInfo,
        mid: "19ainsljv6e7",
        environment: "production",
        type: "merchantInfo"
      };
    </script>
    <script>
      (function () {
        window.__KP_LOGIN_SDK_INSTANCE__ = window.__KP_LOGIN_SDK_INSTANCE__ || {};
        window.__KP_LOGIN_SDK_INSTANCE__.logEvents = window.__KP_LOGIN_SDK_INSTANCE__.logEvents || function(event){
          window.kpqueue = window.kpqueue || [];
          window.kpqueue.push(event);
        };
        var s = document.createElement('script');
        s.type = 'text/javascript';
        s.defer = true;
        s.src = 'https://pdp.gokwik.co/kwikpass/plugin/build/kp-custom-merchant.js';
        s.onload = function() {
          console.log("KwikPass SDK script loaded successfully!");
          window.dispatchEvent(new CustomEvent('kp-script-loaded'));
        };
        var x = document.getElementsByTagName('script')[0];
        x.parentNode.insertBefore(s, x);
      })();
    </script>
  </body>
</html>
